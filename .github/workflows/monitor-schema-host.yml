name: Monitor Hosted Schema

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Check schema host availability and immutability
        env:
          SCHEMA_HOST_URL: https://aurelianaegis.io/schema/attestation-envelope.json
        run: npm run monitor:schema-host
