name: Post-Zenodo Metadata Check

# Run this manually after Zenodo assigns a DOI and CITATION.cff + README are updated.
on:
  workflow_dispatch:

jobs:
  check-doi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Validate DOI in CITATION.cff and README
        run: npm run check:release-metadata

      - name: Verify canonical $id endpoint
        env:
          SCHEMA_HOST_URL: https://aurelianaegis.io/schema/attestation-envelope.json
        run: npm run monitor:schema-host
